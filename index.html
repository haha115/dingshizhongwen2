<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn từ vựng - Google Sheet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #f0f7ff 0%, #e9eef5 100%); font-family: 'Segoe UI', system-ui, sans-serif; padding: 2rem; color: #1a2c3e; }
        .app-container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2rem; background: linear-gradient(135deg, #1e5a7d, #0f3b4f); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .stats-bar { background: white; border-radius: 40px; padding: 12px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .info-badge { background: #eef2fa; padding: 6px 16px; border-radius: 40px; font-weight: 600; }
        .lesson-dropdown { background: #1e5a7d; color: white; border: none; border-radius: 40px; padding: 8px 20px; cursor: pointer; }
        .btn { background: #e2e8f0; border: none; border-radius: 32px; padding: 8px 18px; cursor: pointer; }
        .btn-primary { background: #1e5a7d; color: white; }
        .flashcard-area { background: white; border-radius: 32px; padding: 2rem; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); cursor: pointer; }
        .term-viet { font-size: 2rem; font-weight: 700; color: #1a5d7d; margin-bottom: 1rem; }
        .meaning-chinese { font-size: 1.5rem; color: #b1624b; background: #fff3ed; display: inline-block; padding: 8px 24px; border-radius: 60px; }
        .nav-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .vocab-list { background: white; border-radius: 32px; padding: 1.5rem; margin-top: 20px; }
        .vocab-item { background: #f8fafd; border-radius: 16px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; cursor: pointer; }
        .vocab-item:hover { background: #eef2fa; }
        .loading, .error { text-align: center; padding: 40px; border-radius: 32px; background: white; }
        .error { color: #c0392b; background: #ffe6e6; }
        .hidden { display: none; }
        footer { text-align: center; margin-top: 30px; font-size: 0.75rem; color: #6f8eaa; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>我是最棒的</h1>
        <p>📡 Dữ liệu từ Google Sheet · Tự động cập nhật</p>
    </div>

    <div class="stats-bar">
        <div class="info-badge">📚 Tổng số: <span id="totalCount">0</span> từ</div>
        <div>
            <select id="lessonSelect" class="lesson-dropdown"><option>Đang tải bài học...</option></select>
            <button id="refreshBtn" class="btn">🔄 Làm mới</button>
        </div>
    </div>

    <div class="flashcard-area" id="flashcard">
        <div class="term-viet" id="cardViet">Đang tải...</div>
        <div class="meaning-chinese hidden" id="cardChinese"></div>
        <div class="card-hint">✨ Nhấn vào thẻ để xem nghĩa</div>
    </div>

    <div class="nav-buttons">
        <button class="btn" id="prevBtn">◀ Trước</button>
        <button class="btn" id="nextBtn">Sau ▶</button>
    </div>

    <div class="vocab-list">
        <h3>📖 Danh sách từ vựng</h3>
        <div id="vocabGrid" class="loading">⏳ Đang tải dữ liệu...</div>
    </div>
    <footer>📌 Bấm vào từ trong danh sách để chuyển nhanh</footer>
</div>

<script>
    // ==================== 🔧 DÁN LINK CSV CỦA BẠN VÀO ĐÂY ====================
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbB65oopQxGCy_hXS4oVW4bWv2pydnZ06LIg5QHoW_3NamnMWWXjMjIJc75ZznJeWtvMFYfXzN_aXx/pub?output=csv";
    // ====================================================================

    let allSheetsData = {};
    let sheetNames = [];
    let currentSheet = "";
    let currentVocab = [];
    let currentIndex = 0;
    let showingMeaning = false;

    // Parse CSV đơn giản
    function parseCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        const result = [];
        for (let line of lines) {
            line = line.trim();
            if (line === "") continue;
            
            // Tách bằng dấu phẩy, nhưng bỏ qua dấu phẩy trong ngoặc kép
            let cells = [];
            let current = "";
            let inQuote = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') {
                    inQuote = !inQuote;
                } else if (ch === ',' && !inQuote) {
                    cells.push(current.trim());
                    current = "";
                } else {
                    current += ch;
                }
            }
            cells.push(current.trim());
            
            // Bỏ dấu ngoặc kép thừa
            cells = cells.map(c => c.replace(/^["']|["']$/g, ''));
            
            if (cells.length >= 2 && cells[0] && cells[1]) {
                result.push({ viet: cells[0], chi: cells[1] });
            }
        }
        return result;
    }

    async function fetchData() {
        const gridDiv = document.getElementById("vocabGrid");
        gridDiv.innerHTML = '<div class="loading">⏳ Đang kết nối Google Sheet...</div>';
        
        try {
            const response = await fetch(SHEET_CSV_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const csvText = await response.text();
            console.log("Dữ liệu nhận được:", csvText.substring(0, 500));
            
            const rows = parseCSV(csvText);
            
            if (rows.length === 0) {
                throw new Error("Không tìm thấy dữ liệu. Hãy kiểm tra sheet có ít nhất 2 cột và có dữ liệu không.");
            }
            
            // Gộp tất cả vào một sheet ảo (vì file CSV xuất bản toàn bộ thường gộp chung)
            allSheetsData = { "Tất cả bài học": rows };
            sheetNames = ["Tất cả bài học"];
            
            // Cập nhật dropdown
            const select = document.getElementById("lessonSelect");
            select.innerHTML = '<option value="Tất cả bài học">📚 Tất cả bài học</option>';
            
            currentSheet = "Tất cả bài học";
            currentVocab = rows;
            currentIndex = 0;
            showingMeaning = false;
            
            updateUI();
            
        } catch (error) {
            console.error(error);
            gridDiv.innerHTML = `<div class="error">❌ Lỗi: ${error.message}<br><br>🔧 Kiểm tra lại:<br>1. Link CSV đã đúng định dạng pub?output=csv<br>2. Sheet đã được xuất bản?<br>3. Có ít nhất 2 cột A (tiếng Việt) và B (tiếng Trung)?</div>`;
        }
    }

    function updateUI() {
        document.getElementById("totalCount").innerText = currentVocab.length;
        
        if (currentVocab.length === 0) {
            document.getElementById("cardViet").innerText = "📭 Không có từ vựng";
            document.getElementById("cardChinese").classList.add("hidden");
            document.getElementById("vocabGrid").innerHTML = "<div>Chưa có dữ liệu. Hãy thêm từ vào Sheet.</div>";
            return;
        }
        
        // Cập nhật flashcard
        const item = currentVocab[currentIndex];
        document.getElementById("cardViet").innerText = item.viet;
        document.getElementById("cardChinese").innerHTML = item.chi;
        if (!showingMeaning) {
            document.getElementById("cardChinese").classList.add("hidden");
        } else {
            document.getElementById("cardChinese").classList.remove("hidden");
        }
        
        // Cập nhật danh sách
        renderVocabList();
    }

    function renderVocabList() {
        const container = document.getElementById("vocabGrid");
        let html = "";
        currentVocab.forEach((item, idx) => {
            html += `<div class="vocab-item" data-idx="${idx}">
                        <span>${escapeHtml(item.viet)}</span>
                        <span style="color:#b1624b">${escapeHtml(item.chi.substring(0, 40))}</span>
                     </div>`;
        });
        container.innerHTML = html;
        
        // Gắn sự kiện click cho từng từ
        document.querySelectorAll(".vocab-item").forEach(el => {
            el.addEventListener("click", () => {
                const idx = parseInt(el.dataset.idx);
                if (!isNaN(idx)) {
                    currentIndex = idx;
                    showingMeaning = false;
                    updateUI();
                }
            });
        });
    }

    function nextCard() {
        if (currentVocab.length === 0) return;
        currentIndex = (currentIndex + 1) % currentVocab.length;
        showingMeaning = false;
        updateUI();
    }

    function prevCard() {
        if (currentVocab.length === 0) return;
        currentIndex = (currentIndex - 1 + currentVocab.length) % currentVocab.length;
        showingMeaning = false;
        updateUI();
    }

    function toggleMeaning() {
        showingMeaning = !showingMeaning;
        if (showingMeaning) {
            document.getElementById("cardChinese").classList.remove("hidden");
        } else {
            document.getElementById("cardChinese").classList.add("hidden");
        }
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Sự kiện
    document.getElementById("flashcard").addEventListener("click", toggleMeaning);
    document.getElementById("nextBtn").addEventListener("click", nextCard);
    document.getElementById("prevBtn").addEventListener("click", prevCard);
    document.getElementById("refreshBtn").addEventListener("click", fetchData);
    
    // Khởi chạy
    fetchData();
</script>
</body>
</html>
